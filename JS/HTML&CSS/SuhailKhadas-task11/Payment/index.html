<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
 <div class="main">
    <div class="left">
        <div class="container">
            <h5>Checkout</h5>

            <div class="cont">
            <h4>Contact Details</h4>
            <h5>Email Id</h5>
            <input type="email" placeholder="email@mail.com" class="mail">
            </div>
             <div class="paymet-det">
            <h4>Payment</h4>
            <div class="payment">
                
                    <button class="card-lay">Card</button>
                    <button class="card-lay">Crypto</button>
                    <button class="card-lay">Bank</button>
                    <button class="card-lay">UPI</button>
                    <button class="card-lay">Net <br>Banking</button>      
            
            </div>            
            <div class="c-del">
    <div class="div1"> 
        <h5>Card No.</h5>
        <input type="text" placeholder="123-456-789" class="card-no">
    </div>
    <div class="div2">
        <h5>Expiry</h5>
        <input type="text" placeholder="MM/YY" class="card-no">
    </div>
    <div class="div3">
        <h5>CVV</h5>
        <input type="text" placeholder="***" class="card-no">
    </div>
    <div class="div4">
        <h5>Country</h5>
       <select id="sel1" class="card-no">
	<option value="India">India</option>
	<option value="USA">USA</option>
	<option value="CANADA">CANADA</option>
	<option value="CHINA">CHINA</option>
</select>
    </div>
    <div class="div5">
        <h5>ZIP</h5>
        <input type="text" placeholder="123456" class="card-no">
    </div>
            </div>     
            </div>
        </div>
    </div>
    <div class="right">
        <h1>Order Summary</h1>
            <div class="cop">
                <h5>Enter Coupon Code</h5>
                <input type="text" placeholder="COUPON CODE" class="cop-sr">
                <button class="cop-btn">Apply Coupon</button>
                <div class="total-table">
                    <table>
                <tbody>
                <tr>                
<td>SubTotal&nbsp;</td>
<td class="ll">&nbsp;$400</td>
                </tr>
                <tr>                
<td>Taxes&nbsp;</td>
<td class="ll">&nbsp;$40</td>
                </tr>
                <tr>                
<td>Dicount</td>
<td  class="ll">$0&nbsp;</td>
                </tr>
                <tr>
<td><h4>Total</h4>&nbsp;</td>
<td class="ll"><h4>$440</h4>&nbsp;</td>
                </tr>
                </tbody>
                    </table>
            </div>
            </div>
                     <div class="raz">
        <button class="pay-btn">Pay Now $440</button>
        <img src="./Images/razorpay.png" alt="" class="razorpay">
         </div> 
    </div>
 </div>
    
</body>
</html>
