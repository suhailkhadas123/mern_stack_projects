<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="./output.css">
  <title>Document</title>
</head>
<body>
  <div class="px-40 p-6 sticky top-0 bg-white z-50">
    <span class="logo font-bold text-2xl">Logo</span>
    <section class="float-right flex items-center">
      <ul class="flex items-center">
        <li><a class="me-4" href="#">Product</a></li>
        <li><a class="me-4" href="#">Solution</a></li>
        <li><a class="me-4" href="#">Pricing</a></li>
        <li><a class="me-4" href="#">Resources</a></li>
      </ul>
      <button class="ms-4 font-bold">Login</button>
      <button class="ms-4 bg-black text-amber-50 p-2">Get AI Free</button>

  </div>

      <button class="ms-4 font-bold bg-blue-500 text-white p-3">Get Demo Free</button>

    <section class="relative w-full h-96 mt-16">
      <img src="./images/image.png" alt="" class="absolute left-0 right-0 top-0 bottom-0 m-auto w-1/2 shadow-md">

      <section class="absolute left-20 top-16 bg-white p-3 shadow-md w-56">
        <section class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
            <path d="M19 3h-2c0-.55-.45-1-1-1H8c-.55 0-1 .45-1 1H5c-1.1 0-2 .9-2 2v15c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2m0 17H5V5h2v2h10V5h2z"></path>

        <p>12 Task Completed today</p>

      <section class="absolute right-20 top-20 bg-white shadow-md p-3 w-52">
        <section class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
            <path d="M9 15.59 4.71 11.3 3.3 12.71l5 5c.2.2.45.29.71.29s.51-.1.71-.29l11-11-1.41-1.41L9.02 15.59Z"></path>

      <section class="absolute right-24 bottom-10 bg-white shadow-md p-3 z-40 w-64">
        <h2>Team Activity</h2>
        <section class="flex items-center gap-3 mt-2">
          <section class="w-10 h-10 overflow-hidden">
            <img src="./images/image.png" alt="" class="w-full h-full object-cover">
          </section>
          <span>12 Task Completed today</span>
        </section>
      </section>
    </section>

    <section class="bottom-6 right-6 z-50 fixed">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10h9c.37 0 .71-.21.89-.54.17-.33.15-.73-.06-1.03l-1.75-2.53a10 10 0 0 0 1.93-5.9c0-5.51-4.49-10-10-10Zm6 16.43L19.09 20H12c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8c0 1.91-.69 3.75-1.93 5.21-.3.34-.32.85-.06 1.22Z"></path>
