<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Friendly UI</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-white text-gray-900">

  <header>
    <div class="sticky top-0 z-50 bg-white shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 py-4 flex items-center justify-between">
        
        <h1 class="text-xl sm:text-2xl font-bold">🚀AppName</h1>

        <!-- Desktop nav -->
        <div class="hidden md:flex items-center gap-6">
          <ul class="flex items-center gap-6">
            <li><a href="#" class="hover:text-indigo-600">Features</a></li>
            <li><a href="#" class="hover:text-indigo-600">Pricing</a></li>
            <li><a href="#" class="hover:text-indigo-600">About</a></li>
            <li><a href="#" class="hover:text-indigo-600">Contact</a></li>
          </ul>
          <button class="px-5 py-3 rounded-xl bg-linear-to-r from-indigo-500 to-sky-500 text-white font-medium">
            Get Started
          </button>
        </div>

        <!-- Mobile menu button -->
        <button
          id="menu-btn"
          class="md:hidden p-2 rounded-lg border border-gray-300"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <span class="sr-only">Menu</span>
        </button>
      </div>

      <!-- Mobile nav -->
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-200 bg-white">
        <div class="px-4 py-4 space-y-4">
          <a href="#" class="block hover:text-indigo-600">Features</a>
          <a href="#" class="block hover:text-indigo-600">Pricing</a>
          <a href="#" class="block hover:text-indigo-600">About</a>
          <a href="#" class="block hover:text-indigo-600">Contact</a>
          <button class="w-full px-5 py-3 rounded-xl bg-linear-to-r from-indigo-500 to-sky-500 text-white font-medium">
            Get Started
          </button>
        </div>
      </div>
    </div>
            <div class="flex px-20  h-screen  bg-linear-to-t from-indigo-500 to-sky-500 items-center">
            <div class="left w-1/2 text-white">
                <h1 class="font-bold text-5xl ">Build Amazing <br>Products Faster</h1><br>
                <p>The all-in-one platform for teams to collaborate, build, and <br> ship products that users love.</p> <br>
                <section>
                    <button class="bg-white text-indigo-400 p-5 rounded-2xl">Start Free Trial</button>
                    <button class="border p-5 rounded-2xl">Watch Demo</button>
                </section>
            </div>
            <div class="right w-1/2">
                <img src="./images/office-image.jpg" alt="" class="w-11/12 rounded-2xl shadow-2xl">
            </div>
        </div>
  </header>

  <script>
    const menuBtn = document.getElementById("menu-btn");
    const mobileMenu = document.getElementById("mobile-menu");

    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("hidden");

      const expanded = menuBtn.getAttribute("aria-expanded") === "true";
      menuBtn.setAttribute("aria-expanded", !expanded);
    });
  </script>

</body>
</html>
